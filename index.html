<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
	<link rel="stylesheet" href="css/main.css">
	<title>Ryan Higa</title>
</head>

<body>
	<div class="header">
		<button id="global-home-btn" class="link-button global-home-btn hidden">Home</button>

		<h1 id="main-title">Ryan Higa's Birthday</h1>
	</div>

	<div id="birthdayLock" class="birthday-lock">
		<div id="bigNumber" class="big-number">6</div>
		<div class="birthday-text">days left</div>
		<div class="lock-message">
			Please come back when the countdown ends (or <button id="bypassLock" class="link-button">click here</button>).
		</div>
	</div>

	<div id="yearContainer" class="hidden"></div>

	<div id="message" class="message"></div>

	<div id="year-navigation" class="year-navigation">
        <button class="link-button" data-year="2025">2025</button>
        <span class="nav-dot">•</span>
        <button class="link-button" data-year="2026">2026</button>
    </div>

	<script type="module" src="js/main.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous">
</script>
</body>

</html>
